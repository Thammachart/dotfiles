      - ttf-ibm-plex
      - inter-font
      # - adobe-source-serif-fonts
      - noto-fonts
      - noto-fonts-cjk
      - noto-fonts-emoji
      # - ttf-jetbrains-mono-nerd
      # - ttf-cascadia-code-nerd
      - otf-geist-mono-nerd
      - mpv
      - lxqt-policykit
      - pcmanfm-qt
      - nautilus
      - papers
      # - firefox
      # - chromium
      - network-manager-applet
      - mesa
      - libva-mesa-driver
      - libva-utils
      - vulkan-icd-loader
      - vulkan-validation-layers
      - vulkan-radeon
      - nwg-bar
      - nwg-look
      - sway
      - swaybg
      - swayidle
      - swaylock
      - waybar
      - niri
      - dms-shell-niri
      - matugen
      - mako
      - grim
      - slurp
      - wl-clipboard
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-wlr
      - xdg-user-dirs
      - ghostty
      - xorg-xwayland
      - fuzzel
      - wlsunset
      - shikane
      - pipewire
      - pipewire-pulse
      - pipewire-jack
      - pavucontrol
      - pamixer
      - geany
      - zed
      - featherpad
      # - code
      - libnotify
      - syncthing
      - keepassxc
      - pop-gtk-theme
      - papirus-icon-theme
      - pop-gtk-theme
      - qt5-wayland
      - qt6-wayland
      - qt6ct
      - kvantum
      - lxqt-archiver
      - lximage-qt
      - qt6-imageformats
      - kimageformats
      - qalculate-gtk
      - udisks2
      # - udiskie
      - greetd
      - greetd-tuigreet
      - greetd-regreet
      - wlr-randr
    state: present
- name: Install GUI-related components (AUR)
  kewlfft.aur.aur:
    name:
      # - fonts-tlwg
      - ttf-google-sans-code-vf
      - brave-bin
      - vscodium-bin
    state: present
- name: udisks2 Mount Options
  become: true
  community.general.ini_file:
    path: "{{ udisk_mount_options_path }}"
    mode: "0644"
    section: defaults
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
    state: present
  with_dict:
    ext4_allow: errors=remount-ro,commit
    ext4_defaults: "noatime,commit=30"
    btrfs_defaults: "noatime,compress=zstd:1"
    ntfs_defaults: "uid=$UID,gid=$GID,noatime,prealloc"
- name: gsettings for gnome and gtk settings
  shell: |
    gsettings set org.gnome.desktop.privacy recent-files-max-age 0
    gsettings set org.gnome.desktop.privacy remember-recent-files false
    gsettings set org.gtk.Settings.FileChooser startup-mode "cwd"

    gsettings set org.gnome.desktop.interface monospace-font-name "JetBrains Mono 11"
    gsettings set org.gnome.desktop.thumbnail-cache maximum-size 0
    gsettings set org.gnome.desktop.thumbnailers disable-all true

- name: Import PAM Tasks
  import_tasks: _pam.yml

- name: Import Login Manager Tasks
  import_tasks: _login_manager.yml
